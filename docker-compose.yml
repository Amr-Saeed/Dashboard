version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - mock-api
    environment:
      - REACT_APP_API_URL=http://localhost:3001

  mock-api:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install -g json-server && echo '{\"products\":[]}' > db.json && json-server --watch db.json --host 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
    volumes:
      - ./mock-data:/app

volumes:
  mock-data:
